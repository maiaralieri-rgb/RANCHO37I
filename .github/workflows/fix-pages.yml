name: Fix Pages Source

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-pages.yml'

permissions:
  pages: write
  contents: read
  id-token: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Set Pages source to gh-pages branch
        run: |
          result=$(gh api \
            --method PUT \
            /repos/${{ github.repository }}/pages \
            -f 'source[branch]=gh-pages' \
            -f 'source[path]=/' \
            2>&1)
          echo "Result: $result"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
